<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SatanAI</title>
    
    <link rel="icon" href="{{ url_for('static', filename='ico.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #FCF8F8; color: #2D1515; height: 100vh; overflow: hidden; display: flex; position: relative;}
        
        @keyframes satan-blink { 0%, 80%, 100% { opacity: 0.18; transform: scale(0.75); } 40% { opacity: 1; transform: scale(1); } }
        @keyframes satan-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes satan-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        /* Sidebar Styling */
        .sb-panel { width: 272px; display: flex; flex-direction: column; background: #FCF8F8; border-right: 1px solid #F9DFDF; flex-shrink: 0; z-index: 50; }
        .sb-top { display: flex; align-items: center; padding: 0 1rem; height: 62px; border-bottom: 1px solid #F9DFDF; gap: 10px; }
        .sb-brand-logo { width: 28px; height: 28px; border-radius: 8px; object-fit: cover; border: 1px solid #F5AFAF; }
        .sb-brand-name { font-family: 'Playfair Display', serif; font-size: 1.0625rem; font-weight: 700; color: #2D1515; }
        
        .sb-new-wrap { padding: 0.875rem; border-bottom: 1px solid #F9DFDF; }
        .sb-new-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: linear-gradient(145deg, #E87878, #C85050); color: #fff; border: none; border-radius: 14px; padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .sb-new-btn:hover { transform: translateY(-1px); }
        
        /* History Item */
        .sb-history-area { flex: 1; overflow-y: auto; padding: 1rem; border-bottom: 1px solid #F9DFDF; }
        .sb-history-wrap { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 0.6rem; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 2px;}
        .sb-history-wrap:hover, .sb-history-wrap.active { background: #FBEFEF; }
        .sb-history-wrap:hover .sb-history-actions { opacity: 1; }
        .sb-history-item { flex: 1; text-align: left; background: transparent; border: none; font-family: inherit; font-size: 0.85rem; color: #4A2020; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px;}
        .sb-history-wrap.active .sb-history-item { color: #C85050; font-weight: 600; }
        .sb-history-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
        .action-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: none; background: transparent; cursor: pointer; color: #C08080; }
        .action-icon:hover { background: #F5AFAF; color: #7A2020; }
        .action-icon.pinned { color: #C85050; opacity: 1; }

        /* Configuration */
        .sb-config-area { padding: 1rem; background: #FFFBFB; }
        .api-input { width: 100%; padding: 0.6rem; border: 1px solid #F9DFDF; border-radius: 8px; font-family: inherit; font-size: 0.75rem; margin-bottom: 10px; outline: none; transition: 0.2s;}
        .api-input:focus { border-color: #F5AFAF; background: #fff;}

        /* Main Shell */
        .s-shell { display: flex; flex-direction: column; flex: 1; height: 100%; background: #FCF8F8; min-width: 0; position: relative;}
        .s-header { display: flex; align-items: center; justify-content: space-between; padding: 0 1.75rem; height: 62px; background: rgba(252,248,248,0.9); border-bottom: 1px solid #F9DFDF; }
        .s-name { font-family: 'Playfair Display', serif; font-size: 1.1875rem; font-weight: 700; color: #2D1515; }
        
        .s-scroll { flex: 1; overflow-y: auto; padding: 2.5rem 1rem; }
        .s-inner { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; }
        
        /* Empty State */
        .s-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; text-align: center; gap: 1.375rem; animation: satan-up 0.55s ease; }
        .s-orb { width: 72px; height: 72px; border-radius: 20px; overflow: hidden; border: 2px solid #F5AFAF; animation: satan-float 4s ease-in-out infinite; }
        .s-orb img { width: 100%; height: 100%; object-fit: cover; }
        .s-empty-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: #2D1515; letter-spacing: -0.04em; }
        
        /* Chat Rows */
        .s-row { display: flex; flex-direction: column; padding: 0.5rem 0; animation: satan-up 0.22s ease; position: relative;}
        .s-row:hover .msg-toolbar { opacity: 1; }
        
        /* Toolbars */
        .msg-toolbar { display: flex; gap: 6px; opacity: 0; transition: 0.2s; margin-bottom: 4px;}
        .toolbar-user { align-self: flex-end; }
        .toolbar-ai { align-self: flex-start; margin-left: 30px;}
        .t-btn { background: #F9DFDF; border: 1px solid #F5AFAF; border-radius: 6px; padding: 3px 8px; font-size: 0.65rem; color: #8A4040; cursor: pointer; transition: 0.2s; font-family: inherit;}
        .t-btn:hover { background: #F5AFAF; color: #2D1515; }

        .s-row-user { align-items: flex-end; }
        .s-row-ai { align-items: flex-start; }
        
        .s-user { max-width: 68%; width: fit-content; margin-left: auto; background: linear-gradient(145deg, #E87878 0%, #C85050 100%); color: #fff; border-radius: 20px 20px 5px 20px; padding: 0.875rem 1.25rem; font-size: 0.9375rem; line-height: 1.68; white-space: pre-wrap; word-break: break-word;}
        
        .user-text-content { overflow: hidden; transition: max-height 0.3s ease; }
        .user-text-content.collapsed { max-height: 120px; position: relative; }
        .user-text-content.collapsed::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, #D25C5C); }
        .show-more-btn { background: transparent; border: none; color: #FFD0D0; font-size: 0.75rem; cursor: pointer; text-decoration: underline; margin-top: 5px; font-weight: 600;}
        
        .edit-textarea { width: 100%; min-width: 300px; min-height: 100px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; color: #fff; padding: 10px; font-family: inherit; font-size: 0.9rem; resize: vertical; outline: none;}
        .edit-actions { display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end;}
        .edit-btn { background: #fff; color: #C85050; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600;}
        .edit-cancel { background: transparent; color: #FFD0D0; border: 1px solid #FFD0D0; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;}

        .s-ai-head { font-size: 0.7rem; font-weight: 700; color: #C08080; text-transform: uppercase; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 6px; }
        .s-ai-head-avatar { width: 20px; height: 20px; border-radius: 6px; border: 1px solid #F5AFAF; object-fit: cover; }
        .s-ai-bubble { width: 100%; background: #fff; border: 1px solid #F9DFDF; border-radius: 5px 20px 20px 20px; padding: 1.25rem 1.5rem 1rem; color: #4A2020; font-size: 0.9375rem; line-height: 1.75; }
        
        .s-ai-bubble p { margin-bottom: 0.9rem; }
        .code-wrapper { background: #FFF8F8; border: 1px solid #F5AFAF; border-radius: 10px; overflow: hidden; margin: 1rem 0; }
        .code-header { background: #FBEFEF; border-bottom: 1px solid #F5AFAF; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #B05050; font-family: 'JetBrains Mono', monospace; }
        .copy-code-btn { background: #F9DFDF; border: 1px solid #F5AFAF; border-radius: 6px; padding: 2px 8px; font-size: 0.7rem; color: #A03030; cursor: pointer; transition: 0.2s; }
        .copy-code-btn:hover { background: #F5AFAF; color: #7A2020; }
        .code-wrapper pre { margin: 0; padding: 1rem; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        .s-ai-bubble code { font-family: 'JetBrains Mono', monospace; background: #FBEFEF; color: #B05050; padding: 0.15em 0.45em; border-radius: 5px; }
        .code-wrapper pre code { background: transparent; padding: 0; color: inherit; }
        
        .regen-wrap { display: flex; justify-content: flex-start; margin-top: 15px; padding-top: 10px; border-top: 1px solid #F9DFDF;}
        .regen-btn { background: transparent; border: 1px solid #F5AFAF; border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; color: #C85050; cursor: pointer; transition: 0.2s; display: flex; gap: 5px; align-items: center; font-weight: 600;}
        .regen-btn:hover { background: #FBEFEF; }

        .thinking-box { display: flex; align-items: center; gap: 10px; padding: 0.875rem 1.25rem; background: #fff; border: 1px solid #F9DFDF; border-radius: 6px 18px 18px 18px; width: fit-content; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #E08080; display: inline-block; }
        .dot:nth-child(1) { animation: satan-blink 1.4s ease-in-out 0ms infinite; }
        .dot:nth-child(2) { animation: satan-blink 1.4s ease-in-out 160ms infinite; }
        .dot:nth-child(3) { animation: satan-blink 1.4s ease-in-out 320ms infinite; }

        /* Multi-Modal Components */
        .media-attachment-pill { display: flex; align-items: center; gap: 8px; background: #FBEFEF; border: 1px solid #F5AFAF; border-radius: 10px; padding: 6px 12px; margin-bottom: 8px; width: fit-content; font-size: 0.8rem; color: #8A4040; text-decoration: none;}
        .media-image-frame { max-width: 240px; max-height: 180px; border-radius: 10px; border: 1px solid #F5AFAF; margin-bottom: 8px; display: block; object-fit: cover; cursor: pointer;}
        
        .composer-attachments { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 14px; background: #FFFBFB; border: 1px solid #F9DFDF; border-bottom: none; border-radius: 14px 14px 0 0; display: none; }
        .composer-pill { display: flex; align-items: center; gap: 6px; background: #F5AFAF; color: #2D1515; font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; font-weight: 500; }
        .composer-pill.img-pill { background: #E87878; color: #fff;}
        .composer-pill-remove { cursor: pointer; font-weight: bold; color: inherit; opacity: 0.7; }
        .composer-pill-remove:hover { opacity: 1; }

        /* Dropdown Attachment Menu */
        .attach-menu { position: absolute; bottom: 55px; left: 10px; background: #fff; border: 1px solid #F9DFDF; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; min-width: 200px; z-index: 100; }
        .attach-menu-item { padding: 12px 14px; font-size: 0.85rem; font-weight: 600; color: #4A2020; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px;}
        .attach-menu-item:hover { background: #FBEFEF; color: #C85050; }

        /* Quoting */
        #floating-use-btn { position: absolute; display: none; z-index: 100; background: #2D1515; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transform: translate(-50%, -100%); }
        #floating-use-btn:hover { background: #C85050; }
        #quote-preview { display: none; background: #FBEFEF; border: 1px solid #F5AFAF; border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; font-size: 0.85rem; color: #8A4040; font-style: italic; position: relative; border-left: 4px solid #C85050; }
        .clear-quote { position: absolute; top: 6px; right: 8px; cursor: pointer; color: #C08080; font-weight: bold; }
        .clear-quote:hover { color: #A03030; }

        /* Footer Input Area */
        /* Footer Input Area */
        /* Footer Input Area */
        .s-footer { padding: 0.875rem 1rem 1.25rem; background: linear-gradient(to top, #FCF8F8 72%, transparent); position: relative; z-index: 100; }
        .composer-wrapper { display: flex; flex-direction: column; width: 100%; box-shadow: 0 4px 24px rgba(245,175,175,0.16); border-radius: 18px; overflow: visible; position: relative; }
        .s-ibox { display: flex; align-items: flex-end; background: #fff; border: 1.5px solid #F5AFAF; padding: 0.75rem 0.75rem 0.75rem 1.375rem; border-radius: 18px; position: relative; z-index: 10; }
        .s-textarea { flex: 1; background: transparent; border: none; outline: none; resize: none; font-size: 0.9375rem; padding: 10px 0; font-family: inherit; max-height: 200px; }
        .composer-actions { display: flex; gap: 8px; align-items: center; margin-right: 10px; position: relative; }
        .clip-btn { background: #F9DFDF; border: 1px solid #F5AFAF; width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8A4040; transition: 0.2s; }
        .clip-btn:hover { background: #F5AFAF; color: #2D1515; }
        .s-send { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(145deg, #E87878, #C85050); border: none; color: #fff; cursor: pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
        .s-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Professional Telemetry UI */
        /* Professional Telemetry UI Elements */
        .telemetry-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #A06060;
            margin-top: 6px;
            padding-left: 30px; /* Aligns cleanly under the bubble start */
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: satan-up 0.22s ease;
        }
        .telemetry-val {
            background: #FBEFEF;
            border: 1px solid #F9DFDF;
            padding: 2px 6px;
            border-radius: 4px;
            color: #8A4040;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <button id="floating-use-btn" onclick="useSelectedText()">Use This</button>

    <div class="sb-panel">
        <div class="sb-top">
            <img src="{{ url_for('static', filename='logo.png') }}" class="sb-brand-logo" alt="SatanAI">
            <span class="sb-brand-name">SatanAI</span>
        </div>
        <div class="sb-new-wrap">
            <button class="sb-new-btn" onclick="newChat()">+ New Conversation</button>
        </div>
        
        <div class="sb-history-area" id="history-list"></div>

        <div class="sb-config-area">
            <label style="font-size: 0.65rem; font-weight: 700; color: #D4A0A0; text-transform: uppercase;">Configuration</label>
            <input type="text" id="base-url" class="api-input" style="margin-top: 8px;" placeholder="Base URL" onchange="saveSettings()" />
            <input type="text" id="model-name" class="api-input" placeholder="Model Name" onchange="saveSettings()" />
            <input type="password" id="api-key" class="api-input" style="margin-bottom: 0;" placeholder="API Key" onchange="saveSettings()" />
        </div>
    </div>

    <div class="s-shell">
        <header class="s-header">
            <span class="s-name" id="chat-header-title">New Chat</span>
        </header>

        <div class="s-scroll" id="scroll-area">
            <div class="s-inner" id="chat-container">
                <div class="s-empty" id="empty-state">
                    <div class="s-orb"><img src="{{ url_for('static', filename='logo.png') }}" alt="Orb"></div>
                    <h2 class="s-empty-title">What can I help<br />you with?</h2>
                </div>
            </div>
            
            <div class="s-inner">
                <div class="s-row s-row-ai" id="thinking-indicator" style="display: none;">
                    <div class="s-ai-head">
                        <img src="{{ url_for('static', filename='logo.png') }}" class="s-ai-head-avatar">SatanAI
                    </div>
                    <div class="thinking-box">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                        <span style="font-size: 0.8rem; color: #B06060; font-style: italic; margin-left: 5px;">Thinking...</span>
                    </div>
                </div>
            </div>
        </div>

        <footer class="s-footer">
            <div class="s-inner">
                <div id="quote-preview">
                    <span class="clear-quote" onclick="clearQuote()">×</span>
                    <strong>Replying to:</strong> <br>
                    <span id="quote-text"></span>
                </div>
                
                <div class="composer-wrapper">
                    <div class="composer-attachments" id="composer-attachments-bar"></div>
                    <div class="s-ibox">
                        <div class="composer-actions">
                            
                            <!-- Unified Attachment Plus Button -->
                            <button class="clip-btn" onclick="toggleAttachMenu(event)" title="Attach Media">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>

                            <!-- Hidden Dropdown Menu -->
                            <div id="attach-menu" class="attach-menu" style="display: none;">
                                <div class="attach-menu-item" onclick="triggerFilePicker()">
                                    📄 Attach Document (Max 5)
                                </div>
                                <div class="attach-menu-item" onclick="triggerImagePicker()">
                                    🖼️ Attach Image (Max 1)
                                </div>
                            </div>

                            <input type="file" id="hidden-file-input" multiple style="display: none;" onchange="handleFileSelection(event)">
                            <input type="file" id="hidden-image-input" accept="image/*" style="display: none;" onchange="handleImageSelection(event)">
                        </div>
                        
                        <textarea id="chat-input" class="s-textarea" rows="1" placeholder="Message SatanAI..."></textarea>
                        <button id="send-btn" class="s-send" onclick="sendMessage()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                        </button>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const renderer = new marked.Renderer();
        renderer.code = function(code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            const highlighted = hljs.highlight(code, { language }).value;
            const base64Code = btoa(unescape(encodeURIComponent(code)));
            return `
            <div class="code-wrapper">
                <div class="code-header">
                    <span>${language}</span>
                    <button class="copy-code-btn" onclick="copyCode(this, '${base64Code}')">Copy</button>
                </div>
                <pre><code class="hljs ${language}">${highlighted}</code></pre>
            </div>`;
        };
        marked.setOptions({ renderer: renderer });

        const MAX_FILES = 5;
        const MAX_IMAGE = 1;
        const MAX_FILE_SIZE_MB = 10;
        const MAX_IMAGE_SIZE_MB = 10;

        let messages = [];
        let currentThreadId = null;
        let lastUserMessageId = null; 
        let lastUserMessageText = "";
        
        let activeUploadedFiles = []; 
        let activeUploadedImage = null;
        let activeImageBase64 = null;

        const logoPath = "{{ url_for('static', filename='logo.png') }}";
        const iconPin = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>`;
        const iconTrash = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`;
        const iconEdit = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
        const iconRefresh = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;

        window.onload = async () => {
            await loadSettings();
            await loadHistory();
            setupPasteInterceptor();
        };

        function scrollToBottom() {
            const scrollArea = document.getElementById('scroll-area');
            if (scrollArea) scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        async function loadSettings() {
            const res = await fetch('/api/settings');
            const data = await res.json();
            if (data.base_url) document.getElementById('base-url').value = data.base_url;
            if (data.model_name) document.getElementById('model-name').value = data.model_name;
            if (data.api_key) document.getElementById('api-key').value = data.api_key;
        }

        async function saveSettings() {
            await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    base_url: document.getElementById('base-url').value,
                    model_name: document.getElementById('model-name').value,
                    api_key: document.getElementById('api-key').value
                })
            });
        }

        // --- Menu UI Logic ---
        function toggleAttachMenu(event) {
            console.log("DEBUG: 1. [+] Button was clicked!");
            event.stopPropagation(); // Stop the click from bubbling up to the document
            
            const menu = document.getElementById('attach-menu');
            console.log("DEBUG: 2. Did we find the menu element in the HTML?", menu !== null);
            
            if (menu) {
                console.log("DEBUG: 3. Menu's current display state is:", menu.style.display);
                
                if (menu.style.display === 'flex' || menu.style.display === 'block') {
                    menu.style.display = 'none';

        async function handleFileSelection(event) {
            const files = Array.from(event.target.files);
            if (activeUploadedFiles.length + files.length > MAX_FILES) {
                alert(`Upload blocked: You can only attach up to ${MAX_FILES} standard files at once.`);
                event.target.value = "";
                return;
            }

            for (let file of files) {
                if (file.type.startsWith('image/')) {
                    alert(`Skipping "${file.name}": Please use the 'Attach Image' option from the menu for images.`);
                    continue;
                }
                if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
                    alert(`Upload blocked: File "${file.name}" exceeds the ${MAX_FILE_SIZE_MB}MB size limit.`);
                    continue;
                }
                await processFileUpload(file, 'file');
            }
            event.target.value = "";
        }

        async function handleImageSelection(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (activeUploadedImage) {
                alert(`Upload blocked: You can only attach ${MAX_IMAGE} image per message.`);
                event.target.value = "";
                return;
            }

            if (file.size > MAX_IMAGE_SIZE_MB * 1024 * 1024) {
                alert(`Upload blocked: Image "${file.name}" exceeds the ${MAX_IMAGE_SIZE_MB}MB size limit.`);
                event.target.value = "";
                return;
            }

            if (!confirm("Are you sure your currently selected API Model supports image/multimodal inputs?")) {
                event.target.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onloadend = async function() {
                activeImageBase64 = {
                    mime_type: file.type,
                    base64: reader.result.split(',')[1]
                };
                await processFileUpload(file, 'image');
            };
            reader.readAsDataURL(file);
            event.target.value = "";
        }

        async function processFileUpload(file, type) {
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    if (type === 'image') {
                        activeUploadedImage = { filename: data.filename, url: data.url, type: file.type };
                    } else {
                        activeUploadedFiles.push({ filename: data.filename, url: data.url, type: file.type });
                    }
                    renderComposerAttachmentBar();
                }
            } catch (e) {
                console.error("Upload failed", e);
            }
        }

        // --- Advanced Clipboard Interceptor ---
        function setupPasteInterceptor() {
            const textarea = document.getElementById('chat-input');
            textarea.addEventListener('paste', async (e) => {
                const clipboardData = e.clipboardData || window.clipboardData;
                
                // 1. Check for actual image data in clipboard (e.g. snipping tool)
                if (clipboardData.items) {
                    for (let item of clipboardData.items) {
                        if (item.type.indexOf('image/') !== -1) {
                            e.preventDefault();
                            const file = item.getAsFile();
                            
                            if (activeUploadedImage) {
                                alert(`Upload blocked: You can only attach ${MAX_IMAGE} image per message.`);
                                return;
                            }
                            if (!confirm("Are you sure your currently selected API Model supports image/multimodal inputs?")) return;
                            
                            const reader = new FileReader();
                            reader.onloadend = async function() {
                                activeImageBase64 = {
                                    mime_type: file.type,
                                    base64: reader.result.split(',')[1]
                                };
                                await processFileUpload(file, 'image');
                            };
                            reader.readAsDataURL(file);
                            return; 
                        }
                    }
                }

                const pastedText = clipboardData.getData('text');
                
                // 2. Intercept local path strings (Linux/Windows) from copied OS files
                if (pastedText && pastedText.match(/^(?:\/|[a-zA-Z]:\\).*\.(png|jpe?g|gif|webp|bmp)$/i)) {
                    e.preventDefault();
                    alert("Browser security prevents automatic uploading from pasted local file paths. Please use the '+' menu to attach the image directly.");
                    return;
                }

                // 3. Handle massive text blocks
                if (pastedText && pastedText.length > 2500) {
                    e.preventDefault();
                    if (activeUploadedFiles.length >= MAX_FILES) {
                        alert(`Cannot convert paste to file: You have reached the maximum of ${MAX_FILES} attached files.`);
                        return;
                    }
                    if (confirm("Detected very long text string. Convert to clean .txt attachment pill?")) {
                        const res = await fetch('/api/upload-text', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: pastedText })
                        });
                        const data = await res.json();
                        if (data.success) {
                            activeUploadedFiles.push({ filename: data.filename, url: data.url, type: 'text/plain' });
                            renderComposerAttachmentBar();
                        }
                    } else {
                        textarea.value += pastedText;
                    }
                }
            });
        }

        function renderAllMessages() {
            const container = document.getElementById('chat-container');

            messages.forEach(msg => {

        function parseAttachmentView(content) {
            const fileRegex = /\[File Attachment: (.*?) \((.*?)\)\]/g;
            const imgRegex = /\[Image Attachment: (.*?)\]/g;
            
            let html = content;
            html = html.replace(fileRegex, (match, filename, url) => {
                return `<a href="${url}" target="_blank" class="media-attachment-pill" style="text-decoration:none;">📄 View Document: ${filename}</a>`;
            });
            html = html.replace(imgRegex, (match, url) => {
                return `<img src="${url}" class="media-image-frame" onclick="window.open('${url}')" title="Click to open source image">`;
            });
            return html;
        }

        function appendUserUI(msgId, content) {

            const isLong = content.length > 500;
            const textClass = isLong ? "user-text-content collapsed" : "user-text-content";
            const btnHtml = isLong ? `<button class="show-more-btn" onclick="toggleExpand(this)">Show More</button>` : '';

        async function sendMessage() {
            console.log("DEBUG: sendMessage() triggered");
            
            const inputEl = document.getElementById('chat-input');
            const baseUrlEl = document.getElementById('base-url');
            const modelNameEl = document.getElementById('model-name');
            const apiKeyEl = document.getElementById('api-key');

            const rawText = inputEl.value.trim();
            const baseUrl = baseUrlEl ? baseUrlEl.value.trim() : '';
            const modelName = modelNameEl ? modelNameEl.value.trim() : '';
            const apiKey = apiKeyEl ? apiKeyEl.value.trim() : '';

            // Guard rails: Check missing text/attachments
            if (!rawText && !activeUploadedImage && activeUploadedFiles.length === 0) {
                console.warn("DEBUG: Blocked empty message transmission");
                return;
            }

            // User friendly error: Missing configuration parameters
            if (!baseUrl || !modelName) {
                alert("⚠️ Configuration Error:\nPlease look at the bottom of your sidebar and enter a valid Base URL and Model Name before chatting.");
                return;
            }

            let finalUserPayload = rawText;
            if (activeUploadedImage) {
                finalUserPayload = `[Image Attachment: ${activeUploadedImage.url}]\n${finalUserPayload}`;
            }
            if (activeUploadedFiles.length > 0) {
                let fileTexts = activeUploadedFiles.map(f => `[File Attachment: ${f.filename} (${f.url})]`).join('\n');
                finalUserPayload = `${fileTexts}\n${finalUserPayload}`;
            }
            
            if (currentQuote !== "") {
                finalUserPayload = `Context Reference From Prior Segment:\n"""\n${currentQuote}\n"""\n\n${finalUserPayload}`;
                clearQuote();
            }

            // Automatically create a thread if one doesn't exist
            if (!currentThreadId) {
                try {
                    let generatedTitle = rawText ? (rawText.length > 25 ? rawText.substring(0, 25) + "..." : rawText) : "File Attachment Thread";
                    const res = await fetch('/api/threads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: generatedTitle })
                    });
                    const data = await res.json();
                    currentThreadId = data.thread_id;
                    document.getElementById('chat-header-title').innerText = generatedTitle;
                    loadHistory();
                } catch (error) {
                    console.error("DEBUG Thread Creation Error:", error);
                    alert("📂 Local Database Error:\nFailed to initialize a new conversation thread inside SQLite database.");
                    return;
                }
            }

            const structuralImagePayload = activeImageBase64;

            inputEl.value = '';
            clearAllAttachments();
            document.getElementById('attach-menu').style.display = 'none';
            
            inputEl.disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('thinking-indicator').style.display = 'flex';
            
            const empty = document.getElementById('empty-state');
            if(empty) empty.remove();

            appendUserUI('temp', finalUserPayload);
            scrollToBottom();
            
            const contextHistory = messages.slice(-4);
            contextHistory.push({ role: "user", content: finalUserPayload });

            const bubbleId = 'ai-msg-temp';
            document.getElementById('chat-container').insertAdjacentHTML('beforeend', `
            <div class="s-row s-row-ai">
                <div class="msg-toolbar toolbar-ai"></div>
                <div class="s-ai-head"><img src="${logoPath}" class="s-ai-head-avatar">SatanAI</div>
                <div class="s-ai-bubble" id="${bubbleId}"></div>
            </div>`);
            const aiBubble = document.getElementById(bubbleId);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        messages: contextHistory,
                        base_url: baseUrl,
                        model: modelName,
                        api_key: apiKey,
                        thread_id: currentThreadId,
                        active_image: structuralImagePayload 
                    })
                });

                document.getElementById('thinking-indicator').style.display = 'none';

                // Catch standard Server Failures cleanly
                if (!response.ok) {
                    let errorMessage = `⚠️ Connection Error (${response.status}): `;
                    
                    if (response.status === 400) {
                        errorMessage += "Bad Request. Your current AI endpoint did not understand the query format.";
                        if (structuralImagePayload) {
                            errorMessage += "<br><br><strong>Note:</strong> The AI model or API endpoint you selected does not support image analysis. It is not capable of accepting image uploads.";
                        }
                    } else if (response.status === 401 || response.status === 403) {
                        errorMessage += "Authentication Failed. Your API key is either missing, incorrect, or expired.";
                    } else if (response.status === 404) {
                        errorMessage += "Endpoint Not Found. Check your Base URL routing structure.";
                    } else if (response.status === 503) {
                        errorMessage += "Service Unavailable. Google/OpenAI backend servers are currently overloaded. Please try again in 10 seconds.";
                    } else {
                        errorMessage += "The backend server encountered an unhandled issue processing this turn.";
                    }
                    
                    aiBubble.innerHTML = `<span style='color:#C85050; font-size:0.9rem;'>${errorMessage}</span>`;
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let fullAiText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.error) aiBubble.innerHTML += `<br><span style='color:red'>${data.error}</span>`;
                                
                                // Process incoming streaming text chunks
                                if(data.text) {
                                    fullAiText += data.text;
                                    aiBubble.innerHTML = marked.parse(parseAttachmentView(fullAiText));
                                    scrollToBottom();
                                }

                                // NEW: Intercept and append token usage analytics inside the shell dynamically
                                if (data.usage) {
                                    console.log("DEBUG: Render telemetry data received:", data.usage);
                                    const telemetryHtml = `
                                        <div class="telemetry-pill">
                                            <span>⚡ Context Telemetry:</span>
                                            <span class="telemetry-val" title="Tokens pushed to API context">${data.usage.prompt_tokens} prompt tokens</span>
                                            <span class="telemetry-val" title="Tokens generated by model">${data.usage.completion_tokens} completion tokens</span>
                                            <span class="telemetry-val" title="Total interaction weight">${data.usage.total_tokens} total</span>
                                        </div>
                                    `;
                                    // Inject immediately right below the target AI row row element
                                    aiBubble.parentElement.insertAdjacentHTML('beforeend', telemetryHtml);
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                // Re-sync complete UI accurately from DB records
                selectThread(currentThreadId, document.getElementById('chat-header-title').innerText);

            } catch (error) {
                console.error("Network crash track executed:", error);
                document.getElementById('thinking-indicator').style.display = 'none';
                aiBubble.innerHTML = "<span style='color:#C85050;'>⚠️ Network Offline:<br>Failed to communicate with your local Flask background server. Ensure your terminal script is still running on port 5000.</span>";
            } finally {
                inputEl.disabled = false;
                document.getElementById('send-btn').disabled = false;
                inputEl.focus();
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        // --- Selection Quote Mapping ---
        const floatingBtn = document.getElementById('floating-use-btn');

        document.getElementById('scroll-area').addEventListener('mouseup', function(e) {
            const text = window.getSelection().toString().trim();
            if (text.length > 0) {

        function useSelectedText() {
            currentQuote = window.getSelection().toString().trim();
            if (currentQuote) {
                document.getElementById('quote-preview').style.display = 'block';
                document.getElementById('quote-text').innerText = `"${currentQuote.length > 150 ? currentQuote.substring(0, 150) + "..." : currentQuote}"`;
                document.getElementById('chat-input').focus();
            }
            floatingBtn.style.display = 'none';
            window.getSelection().removeAllRanges();
        }

        function clearQuote() {
            currentQuote = "";
            document.getElementById('quote-preview').style.display = 'none';
        }
    </script>
</body>
</html>
