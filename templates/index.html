<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SatanAI</title>
    <link rel="icon" href="{{ url_for('static', filename='ico.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        /* ===== Design Tokens ===== */
        :root {
            --bg: #FBF7F7;
            --bg-elevated: #FFFFFF;
            --bg-hover: #FBEFEF;
            --bg-active: #F5DFDF;
            --bg-subtle: #FFF9F9;
            --border: #F2DEDE;
            --border-focus: #F0A0A0;
            --text-primary: #2D1515;
            --text-secondary: #5A2828;
            --text-tertiary: #8A4545;
            --text-muted: #B07070;
            --text-faint: #D4A8A8;
            --accent: #C85050;
            --accent-hover: #B84040;
            --accent-light: #E87878;
            --accent-subtle: #F5AFAF;
            --accent-glow: rgba(200,80,80,0.12);
            --radius-xs: 4px;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --radius-full: 9999px;
            --shadow-xs: 0 1px 2px rgba(120,40,40,0.04);
            --shadow-sm: 0 2px 8px rgba(120,40,40,0.06);
            --shadow-md: 0 4px 16px rgba(120,40,40,0.08);
            --shadow-lg: 0 8px 32px rgba(120,40,40,0.12);
            --shadow-xl: 0 16px 48px rgba(120,40,40,0.16);
            --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
            --transition-normal: 0.25s cubic-bezier(0.4,0,0.2,1);
            --transition-smooth: 0.4s cubic-bezier(0.16,1,0.3,1);
            --font-display: 'Playfair Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --sidebar-w: 280px;
        }

        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh; overflow: hidden;
            display: flex; position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== Custom Scrollbar ===== */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-full); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-subtle); }
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        /* ===== Animations ===== */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px) scale(0.96); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(40px) scale(0.96); } }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ===== Toast System ===== */
        #toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            display: flex; align-items: center; gap: 10px;
            padding: 14px 18px; border-radius: var(--radius-lg);
            background: var(--bg-elevated); border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            font-size: 0.875rem; color: var(--text-secondary);
            animation: toastIn var(--transition-smooth) forwards;
            max-width: 380px; line-height: 1.5;
        }
        .toast.removing { animation: toastOut 0.3s ease forwards; }
        .toast-icon { font-size: 1.1rem; flex-shrink: 0; }
        .toast.toast-error { border-color: #F5A0A0; }
        .toast.toast-error .toast-icon { color: var(--accent); }
        .toast.toast-success { border-color: #A0D4A0; }
        .toast.toast-success .toast-icon { color: #4A9A4A; }
        .toast.toast-warning { border-color: #E8C880; }
        .toast.toast-warning .toast-icon { color: #B88830; }
        .toast.toast-info .toast-icon { color: #6A8AC0; }
        .toast-close {
            margin-left: auto; background: none; border: none;
            color: var(--text-faint); cursor: pointer; font-size: 1.1rem;
            padding: 0 0 0 8px; line-height: 1;
        }
        .toast-close:hover { color: var(--text-muted); }

        /* ===== Modal System ===== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 9000;
            background: rgba(30,10,10,0.4); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            animation: overlayIn var(--transition-fast) forwards;
        }
        .modal-box {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-xl);
            padding: 28px 32px; max-width: 440px; width: 90%;
            animation: modalIn var(--transition-smooth) forwards;
        }
        .modal-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
        .modal-body { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 22px; }
        .modal-input {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
            border-radius: var(--radius-md); font-family: inherit; font-size: 0.9rem;
            outline: none; transition: border var(--transition-fast);
            color: var(--text-primary); background: var(--bg-subtle);
            margin-bottom: 20px;
        }
        .modal-input:focus { border-color: var(--border-focus); background: var(--bg-elevated); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn {
            padding: 9px 20px; border-radius: var(--radius-md);
            font-family: inherit; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all var(--transition-fast); border: none;
        }
        .modal-btn-primary { background: var(--accent); color: #fff; }
        .modal-btn-primary:hover { background: var(--accent-hover); }
        .modal-btn-secondary { background: var(--bg-hover); color: var(--text-secondary); border: 1px solid var(--border); }
        .modal-btn-secondary:hover { background: var(--bg-active); }
        .modal-btn-danger { background: #F5E0E0; color: var(--accent); }
        .modal-btn-danger:hover { background: #F0D0D0; }

        /* ===== Mobile Sidebar Toggle ===== */
        .sb-toggle {
            display: none; position: fixed; top: 14px; left: 14px; z-index: 200;
            width: 40px; height: 40px; border-radius: var(--radius-md);
            background: var(--bg-elevated); border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); cursor: pointer;
            align-items: center; justify-content: center; color: var(--text-tertiary);
            transition: all var(--transition-fast);
        }
        .sb-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
        .sb-overlay { display: none; position: fixed; inset: 0; z-index: 40; background: rgba(30,10,10,0.3); }

        @media (max-width: 768px) {
            .sb-toggle { display: flex; }
            .sb-panel { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); transition: transform var(--transition-smooth); z-index: 50; box-shadow: var(--shadow-xl); }
            .sb-panel.open { transform: translateX(0); }
            .sb-overlay.open { display: block; }
            .s-header { padding-left: 64px; }
        }

        /* ===== Sidebar ===== */
        .sb-panel {
            width: var(--sidebar-w); display: flex; flex-direction: column;
            background: var(--bg); border-right: 1px solid var(--border);
            flex-shrink: 0; z-index: 50;
        }
        .sb-top {
            display: flex; align-items: center; padding: 0 1.125rem;
            height: 64px; border-bottom: 1px solid var(--border); gap: 11px;
        }
        .sb-brand-logo {
            width: 32px; height: 32px; border-radius: var(--radius-md);
            object-fit: cover; border: 1.5px solid var(--accent-subtle);
        }
        .sb-brand-name {
            font-family: var(--font-display); font-size: 1.1rem;
            font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em;
        }
        .sb-new-wrap { padding: 0.875rem 1rem; }
        .sb-new-btn {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            background: linear-gradient(145deg, var(--accent-light), var(--accent));
            color: #fff; border: none; border-radius: var(--radius-lg);
            padding: 0.8rem 1rem; font-family: inherit; font-size: 0.875rem;
            font-weight: 600; cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .sb-new-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
        .sb-new-btn:active { transform: translateY(0); }

        /* Search */
        .sb-search-wrap { padding: 0 1rem 0.75rem; }
        .sb-search {
            width: 100%; padding: 9px 12px 9px 34px; border: 1.5px solid var(--border);
            border-radius: var(--radius-md); font-family: inherit; font-size: 0.8rem;
            outline: none; background: var(--bg-subtle); color: var(--text-primary);
            transition: all var(--transition-fast);
        }
        .sb-search:focus { border-color: var(--border-focus); background: var(--bg-elevated); }
        .sb-search-icon {
            position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
            color: var(--text-faint); pointer-events: none;
        }

        /* History Area */
        .sb-history-area { flex: 1; overflow-y: auto; padding: 0.5rem 0.75rem 1rem; }
        .sb-section-label {
            font-size: 0.65rem; font-weight: 700; color: var(--text-faint);
            text-transform: uppercase; letter-spacing: 0.06em;
            padding: 0.5rem 0.5rem 0.4rem; margin-bottom: 2px;
        }
        .sb-history-wrap {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.45rem 0.6rem; border-radius: var(--radius-sm);
            cursor: pointer; transition: all var(--transition-fast); margin-bottom: 1px;
        }
        .sb-history-wrap:hover, .sb-history-wrap.active { background: var(--bg-hover); }
        .sb-history-wrap:hover .sb-history-actions { opacity: 1; }
        .sb-history-wrap.active { background: var(--bg-active); }
        .sb-history-item {
            flex: 1; text-align: left; background: transparent; border: none;
            font-family: inherit; font-size: 0.84rem; color: var(--text-secondary);
            cursor: pointer; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; padding-right: 10px;
        }
        .sb-history-wrap.active .sb-history-item { color: var(--accent); font-weight: 600; }
        .sb-history-actions { display: flex; gap: 2px; opacity: 0; transition: opacity var(--transition-fast); }
        .action-icon {
            width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius-xs); border: none; background: transparent;
            cursor: pointer; color: var(--text-muted); transition: all var(--transition-fast);
        }
        .action-icon:hover { background: var(--accent-subtle); color: var(--accent); }
        .action-icon.pinned { color: var(--accent); opacity: 1; }

        /* Config Area */
        .sb-config-area {
            padding: 1rem; background: var(--bg-subtle);
            border-top: 1px solid var(--border);
        }
        .sb-config-toggle {
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; padding: 2px 0;
        }
        .sb-config-label {
            font-size: 0.65rem; font-weight: 700; color: var(--text-faint);
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .sb-config-chevron { color: var(--text-faint); transition: transform var(--transition-fast); font-size: 0.75rem; }
        .sb-config-chevron.open { transform: rotate(180deg); }
        .sb-config-fields { overflow: hidden; max-height: 0; transition: max-height var(--transition-smooth); }
        .sb-config-fields.open { max-height: 300px; }
        .api-input {
            width: 100%; padding: 0.6rem 0.75rem; border: 1.5px solid var(--border);
            border-radius: var(--radius-md); font-family: var(--font-mono);
            font-size: 0.72rem; margin-top: 10px; outline: none;
            transition: all var(--transition-fast); color: var(--text-secondary);
            background: var(--bg-elevated);
        }
        .api-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow); }
        
        .config-save-btn {
            width: 100%; margin-top: 10px; padding: 0.6rem;
            background: var(--bg-hover); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-secondary);
            font-family: inherit; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: all var(--transition-fast);
        }
        .config-save-btn:hover { 
            background: var(--accent-subtle); 
            color: var(--accent); 
            border-color: var(--accent-subtle); 
        }

        /* ===== Main Shell ===== */
        .s-shell {
            display: flex; flex-direction: column; flex: 1;
            height: 100%; background: var(--bg); min-width: 0; position: relative;
        }
        .s-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.75rem; height: 64px;
            background: rgba(251,247,247,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); z-index: 10;
        }
        .s-header-left { display: flex; align-items: center; gap: 12px; }
        .s-name {
            font-family: var(--font-display); font-size: 1.15rem;
            font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em;
        }
        .s-model-badge {
            font-family: var(--font-mono); font-size: 0.65rem; font-weight: 500;
            color: var(--text-muted); background: var(--bg-hover);
            padding: 3px 10px; border-radius: var(--radius-full);
            border: 1px solid var(--border);
        }
        .s-header-right { display: flex; align-items: center; gap: 6px; }
        .header-icon-btn {
            width: 36px; height: 36px; border-radius: var(--radius-md);
            background: transparent; border: 1px solid transparent;
            color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition-fast);
        }
        .header-icon-btn:hover { background: var(--bg-hover); color: var(--text-tertiary); border-color: var(--border); }

        .s-scroll {
            flex: 1; overflow-y: auto; padding: 2rem 1rem;
            scroll-behavior: smooth;
        }
        .s-inner { max-width: 780px; margin: 0 auto; display: flex; flex-direction: column; }

        /* ===== Empty State ===== */
        .s-empty {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 55vh; text-align: center;
            gap: 1.25rem; animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1);
        }
        .s-orb {
            width: 80px; height: 80px; border-radius: var(--radius-2xl);
            overflow: hidden; border: 2px solid var(--accent-subtle);
            animation: float 5s ease-in-out infinite;
            box-shadow: 0 8px 30px var(--accent-glow);
        }
        .s-orb img { width: 100%; height: 100%; object-fit: cover; }
        .s-empty-title {
            font-family: var(--font-display); font-size: 2.25rem;
            font-weight: 700; color: var(--text-primary); letter-spacing: -0.04em;
            line-height: 1.2;
        }
        .s-empty-subtitle {
            font-size: 0.9rem; color: var(--text-muted); max-width: 400px;
            line-height: 1.6; margin-top: -0.5rem;
        }
        .s-suggestions {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 8px; margin-top: 0.75rem; max-width: 520px;
        }
        .s-suggestion-chip {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-full); padding: 8px 16px;
            font-size: 0.8rem; color: var(--text-tertiary); cursor: pointer;
            transition: all var(--transition-fast); font-family: inherit;
            line-height: 1.4;
        }
        .s-suggestion-chip:hover {
            background: var(--bg-hover); border-color: var(--accent-subtle);
            color: var(--accent); transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        /* ===== Chat Rows ===== */
        .s-row {
            display: flex; flex-direction: column; padding: 0.6rem 0;
            animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1); position: relative;
        }
        .s-row:hover .msg-toolbar { opacity: 1; }
        .s-row-user { align-items: flex-end; }
        .s-row-ai { align-items: flex-start; }

        /* Toolbars */
        .msg-toolbar { display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition-fast); margin-bottom: 4px; }
        .toolbar-user { align-self: flex-end; }
        .toolbar-ai { align-self: flex-start; margin-left: 32px; }
        .t-btn {
            background: var(--bg-hover); border: 1px solid var(--border);
            border-radius: var(--radius-xs); padding: 3px 9px;
            font-size: 0.65rem; color: var(--text-muted); cursor: pointer;
            transition: all var(--transition-fast); font-family: inherit; font-weight: 500;
        }
        .t-btn:hover { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-subtle); }

        /* User Bubble */
        .s-user { 
            align-self: flex-end;
            width: fit-content; 
            max-width: 68%; 
            background: linear-gradient(145deg, #E87878 0%, #C85050 100%); 
            color: #fff; 
            border-radius: 20px 20px 5px 20px; 
            padding: 0.675rem 0.25rem; 
            font-size: 0.9375rem; 
            line-height: 0.88; 
            white-space: pre-wrap; 
            word-break: break-word;
        }
        .user-text-content { overflow: hidden; transition: max-height 0.3s ease; }
        .user-text-content.collapsed { max-height: 120px; position: relative; }
        .user-text-content.collapsed::after {
            content: ""; position: absolute; bottom: 0; left: 0; right: 0;
            height: 40px; background: linear-gradient(transparent, rgba(200,80,80,0.9));
        }
        .show-more-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.75);
            font-size: 0.75rem; cursor: pointer; text-decoration: underline;
            margin-top: 5px; font-weight: 600; font-family: inherit;
        }
        .show-more-btn:hover { color: #fff; }

        .edit-textarea {
            width: 100%; min-width: 300px; min-height: 100px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--radius-md); color: #fff; padding: 10px;
            font-family: inherit; font-size: 0.9rem; resize: vertical; outline: none;
        }
        .edit-textarea:focus { border-color: rgba(255,255,255,0.5); }
        .edit-actions { display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end; }
        .edit-btn {
            background: #fff; color: var(--accent); border: none;
            padding: 7px 14px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.8rem; font-weight: 600; font-family: inherit;
            transition: all var(--transition-fast);
        }
        .edit-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .edit-cancel {
            background: transparent; color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.4); padding: 7px 14px;
            border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem; font-family: inherit;
            transition: all var(--transition-fast);
        }
        .edit-cancel:hover { background: rgba(255,255,255,0.1); }

        /* AI Bubble */
        .s-ai-head {
            font-size: 0.68rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.04em;
            margin-bottom: 0.5rem; display: flex; align-items: center; gap: 7px;
        }
        .s-ai-head-avatar {
            width: 22px; height: 22px; border-radius: var(--radius-sm);
            border: 1.5px solid var(--accent-subtle); object-fit: cover;
        }
        .s-ai-bubble {
            width: 100%; background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs) var(--radius-2xl) var(--radius-2xl) var(--radius-2xl);
            padding: 1.25rem 1.5rem 1rem; color: var(--text-secondary);
            font-size: 0.9375rem; line-height: 1.8;
            box-shadow: var(--shadow-xs);
        }
        .s-ai-bubble p { margin-bottom: 0.85rem; }
        .s-ai-bubble p:last-child { margin-bottom: 0; }
        .s-ai-bubble ul, .s-ai-bubble ol { margin: 0.5rem 0 0.85rem 1.5rem; }
        .s-ai-bubble li { margin-bottom: 0.3rem; }
        .s-ai-bubble strong { color: var(--text-primary); }
        .s-ai-bubble a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
        .s-ai-bubble a:hover { color: var(--accent-hover); }
        .s-ai-bubble blockquote {
            border-left: 3px solid var(--accent-subtle); padding-left: 1rem;
            margin: 0.75rem 0; color: var(--text-muted); font-style: italic;
        }

        /* Code Blocks */
        .code-wrapper {
            background: #FFFAFA; border: 1px solid var(--border);
            border-radius: var(--radius-md); overflow: hidden; margin: 1rem 0;
        }
        .code-header {
            background: var(--bg-hover); border-bottom: 1px solid var(--border);
            padding: 7px 14px; display: flex; justify-content: space-between;
            align-items: center; font-size: 0.72rem; color: var(--text-muted);
            font-family: var(--font-mono); font-weight: 500;
        }
        .copy-code-btn {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 2px 10px;
            font-size: 0.68rem; color: var(--text-muted); cursor: pointer;
            transition: all var(--transition-fast); font-family: inherit; font-weight: 500;
        }
        .copy-code-btn:hover { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-subtle); }
        .code-wrapper pre {
            margin: 0; padding: 1rem; overflow-x: auto;
            font-family: var(--font-mono); font-size: 0.84rem; line-height: 1.65;
        }
        .s-ai-bubble code {
            font-family: var(--font-mono); background: var(--bg-hover);
            color: var(--accent); padding: 0.15em 0.45em; border-radius: var(--radius-xs);
            font-size: 0.88em;
        }
        .code-wrapper pre code { background: transparent; padding: 0; color: inherit; font-size: inherit; }

        /* Regenerate */
        .regen-wrap {
            display: flex; justify-content: flex-start; margin-top: 14px;
            padding-top: 12px; border-top: 1px solid var(--border);
        }
        .regen-btn {
            background: transparent; border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 7px 14px;
            font-size: 0.75rem; color: var(--accent); cursor: pointer;
            transition: all var(--transition-fast); display: flex;
            gap: 6px; align-items: center; font-weight: 600; font-family: inherit;
        }
        .regen-btn:hover { background: var(--bg-hover); border-color: var(--accent-subtle); }

        /* Thinking Indicator */
        .thinking-box {
            display: flex; align-items: center; gap: 10px;
            padding: 0.9rem 1.3rem; background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs) var(--radius-xl) var(--radius-xl) var(--radius-xl);
            width: fit-content; box-shadow: var(--shadow-xs);
        }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--accent-light); display: inline-block;
        }
        .dot:nth-child(1) { animation: pulse 1.4s ease-in-out 0ms infinite; }
        .dot:nth-child(2) { animation: pulse 1.4s ease-in-out 200ms infinite; }
        .dot:nth-child(3) { animation: pulse 1.4s ease-in-out 400ms infinite; }
        .thinking-label {
            font-size: 0.8rem; color: var(--text-muted);
            font-style: italic; margin-left: 4px;
        }

        /* Timestamp */
        .msg-timestamp {
            font-size: 0.65rem; color: var(--text-faint); margin-top: 4px;
            font-family: var(--font-mono); padding: 0 4px;
        }
        .s-row-user .msg-timestamp { text-align: right; padding-right: 4px; }
        .s-row-ai .msg-timestamp { padding-left: 32px; }

        /* Telemetry */
        .telemetry-pill {
            font-family: var(--font-mono); font-size: 0.62rem;
            color: var(--text-faint); margin-top: 6px; padding-left: 32px;
            display: flex; align-items: center; gap: 8px;
            animation: slideUp 0.22s ease;
        }
        .telemetry-val {
            background: var(--bg-hover); border: 1px solid var(--border);
            padding: 2px 7px; border-radius: var(--radius-xs);
            color: var(--text-muted); font-weight: 500;
        }

        /* ===== Multi-Modal Components ===== */
        .media-attachment-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--bg-hover); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 7px 14px; margin-bottom: 8px;
            width: fit-content; font-size: 0.8rem; color: var(--text-tertiary);
            text-decoration: none; transition: all var(--transition-fast);
        }
        .media-attachment-pill:hover { background: var(--bg-active); border-color: var(--accent-subtle); }
        .media-image-frame {
            max-width: 260px; max-height: 200px; border-radius: var(--radius-md);
            border: 1px solid var(--border); margin-bottom: 8px; display: block;
            object-fit: cover; cursor: pointer; transition: all var(--transition-fast);
        }
        .media-image-frame:hover { border-color: var(--accent-subtle); box-shadow: var(--shadow-md); }

        /* Composer Attachments Bar */
        .composer-attachments {
            display: none; flex-wrap: wrap; gap: 8px;
            padding: 10px 16px; background: var(--bg-subtle);
            border: 1px solid var(--border); border-bottom: none;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }
        .composer-pill {
            display: flex; align-items: center; gap: 6px;
            background: var(--accent-subtle); color: var(--text-primary);
            font-size: 0.75rem; padding: 5px 11px; border-radius: var(--radius-sm);
            font-weight: 500; font-family: var(--font-mono);
        }
        .composer-pill.img-pill { background: var(--accent); color: #fff; }
        .composer-pill-remove {
            cursor: pointer; font-weight: bold; color: inherit;
            opacity: 0.6; transition: opacity var(--transition-fast);
            font-size: 1rem; line-height: 1; margin-left: 2px;
        }
        .composer-pill-remove:hover { opacity: 1; }

        /* Attach Dropdown Menu */
        .attach-menu {
            position: absolute; bottom: 56px; left: 10px;
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
            display: flex; flex-direction: column; overflow: hidden;
            min-width: 220px; z-index: 100;
            animation: scaleIn 0.2s cubic-bezier(0.16,1,0.3,1);
            transform-origin: bottom left;
        }
        .attach-menu-item {
            padding: 13px 16px; font-size: 0.85rem; font-weight: 500;
            color: var(--text-secondary); cursor: pointer;
            transition: all var(--transition-fast); display: flex;
            align-items: center; gap: 10px;
        }
        .attach-menu-item:hover { background: var(--bg-hover); color: var(--accent); }
        .attach-menu-item + .attach-menu-item { border-top: 1px solid var(--border); }
        .attach-menu-item-icon {
            width: 30px; height: 30px; border-radius: var(--radius-sm);
            background: var(--bg-hover); display: flex; align-items: center;
            justify-content: center; font-size: 0.9rem; flex-shrink: 0;
        }

        /* Quoting */
        #floating-use-btn {
            position: absolute; display: none; z-index: 100;
            background: var(--text-primary); color: #fff; border: none;
            padding: 6px 14px; border-radius: var(--radius-sm);
            font-size: 0.78rem; cursor: pointer; font-family: inherit; font-weight: 500;
            box-shadow: var(--shadow-md); transform: translate(-50%, -110%);
            transition: background var(--transition-fast);
        }
        #floating-use-btn:hover { background: var(--accent); }
        #quote-preview {
            display: none; background: var(--bg-hover); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 10px;
            font-size: 0.85rem; color: var(--text-tertiary); font-style: italic;
            position: relative; border-left: 4px solid var(--accent);
        }
        .clear-quote {
            position: absolute; top: 8px; right: 10px; cursor: pointer;
            color: var(--text-muted); font-weight: bold; font-size: 1rem;
            line-height: 1; transition: color var(--transition-fast);
        }
        .clear-quote:hover { color: var(--accent); }

        /* ===== Footer / Composer ===== */
        .s-footer {
            padding: 0.75rem 1rem 1.25rem;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            position: relative; z-index: 100;
        }
        .composer-wrapper {
            display: flex; flex-direction: column; width: 100%;
            box-shadow: 0 4px 28px rgba(200,80,80,0.1);
            border-radius: var(--radius-xl); overflow: visible;
            position: relative;
        }
        .s-ibox {
            display: flex; align-items: flex-end;
            background: var(--bg-elevated); border: 1.5px solid var(--border);
            padding: 0.6rem 0.75rem 0.6rem 1.25rem;
            border-radius: var(--radius-xl); position: relative; z-index: 10;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .s-ibox:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .s-textarea {
            flex: 1; background: transparent; border: none; outline: none;
            resize: none; font-size: 0.9375rem; padding: 10px 0;
            font-family: inherit; max-height: 200px; line-height: 1.6;
            color: var(--text-primary);
        }
        .s-textarea::placeholder { color: var(--text-faint); }
        .composer-actions {
            display: flex; gap: 8px; align-items: center;
            margin-right: 10px; position: relative;
        }
        .clip-btn {
            background: var(--bg-hover); border: 1px solid var(--border);
            width: 36px; height: 36px; border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-muted);
            transition: all var(--transition-fast);
        }
        .clip-btn:hover { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-subtle); }
        .s-send {
            width: 40px; height: 40px; border-radius: var(--radius-md);
            background: linear-gradient(145deg, var(--accent-light), var(--accent));
            border: none; color: #fff; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition-fast);
            box-shadow: 0 2px 10px var(--accent-glow);
        }
        .s-send:hover { transform: scale(1.05); box-shadow: 0 4px 16px var(--accent-glow); }
        .s-send:active { transform: scale(0.97); }
        .s-send:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
        .s-send:disabled:hover { transform: none; }

        /* Composer Footer Info */
        .composer-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 4px 0; font-size: 0.65rem; color: var(--text-faint);
        }
        .char-counter { font-family: var(--font-mono); }
        .char-counter.warn { color: #C08040; }
        .char-counter.danger { color: var(--accent); font-weight: 600; }
        .shortcut-hint { opacity: 0.7; }
        .shortcut-hint kbd {
            background: var(--bg-hover); border: 1px solid var(--border);
            padding: 1px 5px; border-radius: 3px; font-family: var(--font-mono);
            font-size: 0.6rem;
        }

        /* ===== Keyboard Shortcut Helper ===== */
        .kbd-shortcuts-modal .shortcut-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid var(--border);
        }
        .kbd-shortcuts-modal .shortcut-row:last-child { border-bottom: none; }
        .kbd-shortcuts-modal .shortcut-label { font-size: 0.85rem; color: var(--text-secondary); }
        .kbd-shortcuts-modal kbd {
            background: var(--bg-hover); border: 1px solid var(--border);
            padding: 3px 8px; border-radius: var(--radius-xs);
            font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-tertiary);
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Floating Quote Button -->
    <button id="floating-use-btn" onclick="useSelectedText()">Quote Selection</button>

    <!-- Mobile Sidebar Toggle -->
    <button class="sb-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="sb-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sb-panel" id="sb-panel">
        <div class="sb-top">
            <img src="{{ url_for('static', filename='logo.png') }}" class="sb-brand-logo" alt="SatanAI">
            <span class="sb-brand-name">SatanAI</span>
        </div>
        <div class="sb-new-wrap">
            <button class="sb-new-btn" onclick="newChat()">+ New Conversation</button>
        </div>
        
        <div style="padding: 0.75rem 1rem 0;">
            <input type="text" id="history-search" class="api-input" style="margin-bottom: 0; background: #fff;" placeholder="Search all messages..." oninput="filterHistory()" />
        </div>
        
        <div class="sb-history-area" id="history-list"></div>

        <div class="sb-config-area">
            <div class="sb-config-toggle" onclick="toggleConfig()">
                <span class="sb-config-label">Configuration</span>
                <span class="sb-config-chevron" id="config-chevron">&#9660;</span>
            </div>
            <div class="sb-config-fields" id="config-fields">
                <input type="text" id="base-url" class="api-input" placeholder="Base URL" />
                <input type="text" id="model-name" class="api-input" placeholder="Model Name" />
                <input type="password" id="api-key" class="api-input" placeholder="API Key" />
                <button class="config-save-btn" onclick="saveSettings()">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Main Shell -->
    <div class="s-shell">
        <header class="s-header">
            <div class="s-header-left">
                <span class="s-name" id="chat-header-title">New Chat</span>
                <span class="s-model-badge" id="model-badge"></span>
            </div>
            <div class="s-header-right">
                <button class="header-icon-btn" onclick="showShortcuts()" title="Keyboard Shortcuts">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.001M10 8h.001M14 8h.001M18 8h.001M8 12h.001M12 12h.001M16 12h.001M7 16h10"/></svg>
                </button>
            </div>
        </header>

        <div class="s-scroll" id="scroll-area">
            <div class="s-inner" id="chat-container">
                <div class="s-empty" id="empty-state">
                    <div class="s-orb"><img src="{{ url_for('static', filename='logo.png') }}" alt="SatanAI"></div>
                    <h2 class="s-empty-title">What can I help<br>you with?</h2>
                    <p class="s-empty-subtitle">Ask anything, share files for analysis, or describe what you need built.</p>
                    <div class="s-suggestions">
                        <button class="s-suggestion-chip" onclick="fillSuggestion(this)">Explain a complex topic simply</button>
                        <button class="s-suggestion-chip" onclick="fillSuggestion(this)">Help me debug my code</button>
                        <button class="s-suggestion-chip" onclick="fillSuggestion(this)">Write a professional email</button>
                        <button class="s-suggestion-chip" onclick="fillSuggestion(this)">Analyze a document for me</button>
                    </div>
                </div>
            </div>

            <div class="s-inner">
                <div class="s-row s-row-ai" id="thinking-indicator" style="display: none;">
                    <div class="s-ai-head">
                        <img src="{{ url_for('static', filename='logo.png') }}" class="s-ai-head-avatar">SatanAI
                    </div>
                    <div class="thinking-box">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                        <span class="thinking-label">Thinking...</span>
                    </div>
                </div>
            </div>
        </div>

        <footer class="s-footer">
            <div class="s-inner">
                <div id="quote-preview">
                    <span class="clear-quote" onclick="clearQuote()">&times;</span>
                    <strong>Replying to:</strong><br>
                    <span id="quote-text"></span>
                </div>

                <div class="composer-wrapper">
                    <div class="composer-attachments" id="composer-attachments-bar"></div>
                    <div class="s-ibox">
                        <div class="composer-actions">
                            <button class="clip-btn" onclick="toggleAttachMenu(event)" title="Attach Media">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                            <div id="attach-menu" class="attach-menu" style="display: none;">
                                <div class="attach-menu-item" onclick="triggerFilePicker()">
                                    <span class="attach-menu-item-icon">&#128196;</span> Attach Document (Max 5)
                                </div>
                                <div class="attach-menu-item" onclick="triggerImagePicker()">
                                    <span class="attach-menu-item-icon">&#128444;</span> Attach Image (Max 1)
                                </div>
                            </div>
                            <input type="file" id="hidden-file-input" multiple style="display: none;" onchange="handleFileSelection(event)">
                            <input type="file" id="hidden-image-input" accept="image/*" style="display: none;" onchange="handleImageSelection(event)">
                        </div>
                        <textarea id="chat-input" class="s-textarea" rows="1" placeholder="Message SatanAI..."></textarea>
                        <button id="send-btn" class="s-send" onclick="sendMessage()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                        </button>
                    </div>
                    <div class="composer-footer">
                        <span class="char-counter" id="char-counter">0 chars</span>
                        <span class="shortcut-hint"><kbd>Enter</kbd> to send &middot; <kbd>Shift+Enter</kbd> new line</span>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        /* ===== Marked & Highlight.js Config ===== */
        const renderer = new marked.Renderer();
        renderer.code = function(code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            const highlighted = hljs.highlight(code, { language }).value;
            const base64Code = btoa(unescape(encodeURIComponent(code)));
            return `
            <div class="code-wrapper">
                <div class="code-header">
                    <span>${language}</span>
                    <button class="copy-code-btn" onclick="copyCode(this, '${base64Code}')">Copy</button>
                </div>
                <pre><code class="hljs ${language}">${highlighted}</code></pre>
            </div>`;
        };
        marked.setOptions({ renderer: renderer });

        /* ===== Constants ===== */
        const MAX_FILES = 5;
        const MAX_IMAGE = 1;
        const MAX_FILE_SIZE_MB = 10;
        const MAX_IMAGE_SIZE_MB = 10;

        /* ===== State ===== */
        let messages = [];
        let currentThreadId = null;
        let lastUserMessageId = null;
        let lastUserMessageText = "";
        let activeUploadedFiles = [];
        let activeUploadedImage = null;
        let activeImageBase64 = null;
        let currentQuote = "";
        let allThreadsCache = [];

        const logoPath = "{{ url_for('static', filename='logo.png') }}";

        /* ===== SVG Icon Templates ===== */
        const iconPin = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>`;
        const iconTrash = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`;
        const iconEdit = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
        const iconRefresh = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;

        /* ===== Toast System ===== */
        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toast-container');
            const icons = {
                error: '&#10060;', success: '&#9989;', warning: '&#9888;', info: '&#8505;'
            };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${icons[type] || icons.info}</span>
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.classList.add('removing');setTimeout(()=>this.parentElement.remove(),300)">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        /* ===== Custom Modal System ===== */
        function showModal({ title, body, input, placeholder, confirmText, cancelText, confirmClass, onConfirm, onCancel }) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); if (onCancel) onCancel(); } };

            let bodyHTML = `<div class="modal-body">${body || ''}</div>`;
            if (input) {
                bodyHTML += `<input class="modal-input" id="modal-input-field" placeholder="${placeholder || ''}" value="${(typeof input === 'string') ? input : ''}" autofocus>`;
            }

            overlay.innerHTML = `
                <div class="modal-box">
                    <div class="modal-title">${title}</div>
                    ${bodyHTML}
                    <div class="modal-actions">
                        <button class="modal-btn modal-btn-secondary" id="modal-cancel">${cancelText || 'Cancel'}</button>
                        <button class="modal-btn ${confirmClass || 'modal-btn-primary'}" id="modal-confirm">${confirmText || 'Confirm'}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const inputField = overlay.querySelector('#modal-input-field');
            if (inputField) {
                inputField.focus();
                inputField.select();
            }

            overlay.querySelector('#modal-confirm').onclick = () => {

        /* ===== Auto-Resize Textarea ===== */
        function setupAutoResize() {

        /* ===== Character Counter ===== */
        function setupCharCounter() {

        }

        function updateCharCounter() {
            const textarea = document.getElementById('chat-input');

            counter.textContent = `${len} chars`;

        /* ===== Global Keyboard Shortcuts ===== */
        function setupGlobalShortcuts() {
            document.addEventListener('keydown', function(e) {
                // Ctrl+Shift+N: New chat
                if (e.ctrlKey && e.shiftKey && e.key === 'N') {
                    e.preventDefault();
                    newChat();
                }
                // Ctrl+/: Focus input
                if (e.ctrlKey && e.key === '/') {
                    e.preventDefault();
                    document.getElementById('chat-input').focus();
                }
                // Ctrl+B: Toggle sidebar
                if (e.ctrlKey && e.key === 'b') {
                    e.preventDefault();
                    toggleSidebar();

                // Escape: Close menus, modals
                if (e.key === 'Escape') {
                    document.getElementById('attach-menu').style.display = 'none';

        /* ===== Quote Selection ===== */
        function setupQuoteSelector() {
            document.addEventListener('mouseup', function(e) {
                const selection = window.getSelection();
                const text = selection.toString().trim();
                const btn = document.getElementById('floating-use-btn');

                if (text.length > 10) {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    btn.style.display = 'block';
                    btn.style.left = (rect.left + rect.width / 2 + window.scrollX) + 'px';
                    btn.style.top = (rect.top + window.scrollY - 10) + 'px';
                } else {
                    btn.style.display = 'none';
                }
            });
        }

        function useSelectedText() {
            const selection = window.getSelection();
            if (selection.toString().trim()) {
                currentQuote = selection.toString().trim();
                if (currentQuote.length > 300) currentQuote = currentQuote.substring(0, 300) + '...';
                document.getElementById('quote-text').textContent = currentQuote;
                document.getElementById('quote-preview').style.display = 'block';
                document.getElementById('floating-use-btn').style.display = 'none';

        /* ===== File Pickers ===== */
        function triggerFilePicker() {
            document.getElementById('attach-menu').style.display = 'none';
            document.getElementById('hidden-file-input').click();
        }
        function triggerImagePicker() {
            document.getElementById('attach-menu').style.display = 'none';
            document.getElementById('hidden-image-input').click();
        }

        async function handleFileSelection(event) {
            const files = Array.from(event.target.files);
            if (activeUploadedFiles.length + files.length > MAX_FILES) {
                showToast(`Upload blocked: You can only attach up to ${MAX_FILES} standard files at once.`, 'warning');
                event.target.value = "";
                return;
            }
            for (let file of files) {
                if (file.type.startsWith('image/')) {
                    showToast(`Skipping "${file.name}": Please use the 'Attach Image' option for images.`, 'warning');
                    continue;
                }
                if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
                    showToast(`Upload blocked: File "${file.name}" exceeds the ${MAX_FILE_SIZE_MB}MB size limit.`, 'error');
                    continue;
                }
                await processFileUpload(file, 'file');
            }
            event.target.value = "";
        }

        async function handleImageSelection(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (activeUploadedImage) {
                showToast(`Upload blocked: You can only attach ${MAX_IMAGE} image per message.`, 'warning');
                event.target.value = "";
                return;
            }
            if (file.size > MAX_IMAGE_SIZE_MB * 1024 * 1024) {
                showToast(`Upload blocked: Image "${file.name}" exceeds the ${MAX_IMAGE_SIZE_MB}MB size limit.`, 'error');
                event.target.value = "";
                return;
            }
            showModal({
                title: 'Multimodal Confirmation',
                body: 'Does your currently selected API Model support image/multimodal inputs? Sending images to a text-only model will fail.',
                confirmText: 'Yes, Send Image',
                cancelText: 'Cancel',
                confirmClass: 'modal-btn-primary',
                onConfirm: async () => {
                    const reader = new FileReader();
                    reader.onloadend = async function() {
                        activeImageBase64 = {
                            mime_type: file.type,
                            base64: reader.result.split(',')[1]
                        };
                        await processFileUpload(file, 'image');
                    };
                    reader.readAsDataURL(file);
                },
                onCancel: () => { event.target.value = ""; }
            });
            event.target.value = "";
        }

        async function processFileUpload(file, type) {
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    if (type === 'image') {
                        activeUploadedImage = { filename: data.filename, url: data.url, type: file.type };
                    } else {
                        activeUploadedFiles.push({ filename: data.filename, url: data.url, type: file.type });
                    }
                    renderComposerAttachmentBar();
                    showToast(`Attached "${file.name}" successfully.`, 'success', 2500);
                }
            } catch (e) {
                console.error("Upload failed", e);
                showToast("Upload failed. Please try again.", 'error');
            }
        }

        /* ===== Paste Interceptor ===== */
        function setupPasteInterceptor() {
            const textarea = document.getElementById('chat-input');
            textarea.addEventListener('paste', async (e) => {
                const clipboardData = e.clipboardData || window.clipboardData;
                if (clipboardData.items) {
                    for (let item of clipboardData.items) {
                        if (item.type.indexOf('image/') !== -1) {
                            e.preventDefault();
                            const file = item.getAsFile();
                            if (activeUploadedImage) {
                                showToast(`Upload blocked: You can only attach ${MAX_IMAGE} image per message.`, 'warning');
                                return;
                            }
                            showModal({
                                title: 'Multimodal Confirmation',
                                body: 'Does your currently selected API Model support image/multimodal inputs? Sending images to a text-only model will fail.',
                                confirmText: 'Yes, Send Image',
                                cancelText: 'Cancel',
                                onConfirm: async () => {
                                    const reader = new FileReader();
                                    reader.onloadend = async function() {
                                        activeImageBase64 = {
                                            mime_type: file.type,
                                            base64: reader.result.split(',')[1]
                                        };
                                        await processFileUpload(file, 'image');
                                    };
                                    reader.readAsDataURL(file);
                                }
                            });
                            return;
                        }
                    }
                }
                const pastedText = clipboardData.getData('text');
                if (pastedText && pastedText.match(/^(?:\/|[a-zA-Z]:\\).*\.(png|jpe?g|gif|webp|bmp)$/i)) {
                    e.preventDefault();
                    showToast("Browser security prevents automatic uploading from pasted local file paths. Please use the '+' menu to attach the image directly.", 'warning', 5000);
                    return;
                }
                if (pastedText && pastedText.length > 2500) {
                    e.preventDefault();
                    if (activeUploadedFiles.length >= MAX_FILES) {
                        showToast(`Cannot convert paste to file: You have reached the maximum of ${MAX_FILES} attached files.`, 'warning');
                        return;
                    }
                    showModal({
                        title: 'Long Text Detected',
                        body: `Detected a very long text string (${pastedText.length} characters). Convert to a clean .txt attachment?`,
                        confirmText: 'Convert to File',
                        cancelText: 'Paste as Text',
                        onConfirm: async () => {
                            const res = await fetch('/api/upload-text', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ text: pastedText })
                            });
                            const data = await res.json();
                            if (data.success) {
                                activeUploadedFiles.push({ filename: data.filename, url: data.url, type: 'text/plain' });
                                renderComposerAttachmentBar();
                                showToast('Text converted to file attachment.', 'success', 2500);
                            }
                        },
                        onCancel: () => { textarea.value += pastedText; updateCharCounter(); }
                    });
                }
            });
        }

        /* ===== Composer Attachment Bar ===== */
        function renderComposerAttachmentBar() {
            const bar = document.getElementById('composer-attachments-bar');
            bar.innerHTML = "";
            let hasContent = false;
            if (activeUploadedImage) {
                hasContent = true;
                bar.innerHTML += `
                    <div class="composer-pill img-pill">
                        <span>&#128444; ${activeUploadedImage.filename}</span>
                        <span class="composer-pill-remove" onclick="removeImage()">&times;</span>
                    </div>`;
            }
            activeUploadedFiles.forEach((file, index) => {
                hasContent = true;
                bar.innerHTML += `
                    <div class="composer-pill">
                        <span>&#128196; ${file.filename}</span>
                        <span class="composer-pill-remove" onclick="removeFile(${index})">&times;</span>
                    </div>`;
            });
            bar.style.display = hasContent ? 'flex' : 'none';
        }

        function removeFile(index) {
            activeUploadedFiles.splice(index, 1);
            renderComposerAttachmentBar();
        }
        function removeImage() {
            activeUploadedImage = null;
            activeImageBase64 = null;
            renderComposerAttachmentBar();
        }
        function clearAllAttachments() {
            activeUploadedFiles = [];
            activeUploadedImage = null;
            activeImageBase64 = null;
            renderComposerAttachmentBar();
        }

        /* ===== History ===== */
        async function loadHistory(searchQuery = '') {
            // If there is a search query, append it to the API URL
            const url = searchQuery ? `/api/threads?q=${encodeURIComponent(searchQuery)}` : '/api/threads';
            
            const res = await fetch(url);
            const data = await res.json();
            allThreadsCache = data.threads;
            
            const list = document.getElementById('history-list');
            const pinned = data.threads.filter(t => t.is_pinned);
            const recent = data.threads.filter(t => !t.is_pinned);

            let html = '';
            
            if (searchQuery && data.threads.length === 0) {
                html += `<div style="font-size:0.8rem;color:var(--text-faint);padding:1rem 0.5rem;text-align:center;">No messages found matching "${searchQuery}"</div>`;
            } else {
                if (pinned.length > 0) {
                    html += `<div class="sb-section-label">Pinned</div>`;
                    pinned.forEach(thread => { html += renderHistoryItem(thread); });
                }
                html += `<div class="sb-section-label">${searchQuery ? 'Search Results' : 'Recent Chats'}</div>`;
                if (recent.length === 0 && pinned.length === 0 && !searchQuery) {
                    html += `<div style="font-size:0.8rem;color:var(--text-faint);padding:0.5rem;text-align:center;">No conversations yet</div>`;
                }
                recent.forEach(thread => { html += renderHistoryItem(thread); });
            }

            list.innerHTML = html;
        }

        function renderHistoryItem(thread) {
            const isActive = currentThreadId === thread.id ? 'active' : '';
            const pinClass = thread.is_pinned ? 'pinned' : '';
            const safeTitle = thread.title.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            return `
                <div class="sb-history-wrap ${isActive}" onclick="selectThread(${thread.id}, '${safeTitle}')">
                    <button class="sb-history-item">${thread.title}</button>
                    <div class="sb-history-actions ${pinClass}">
                        <button class="action-icon" onclick="renameThread(${thread.id}, '${safeTitle}', event)" title="Rename">${iconEdit}</button>
                        <button class="action-icon ${pinClass}" onclick="togglePin(${thread.id}, event)" title="Pin">${iconPin}</button>
                        <button class="action-icon" onclick="deleteThread(${thread.id}, event)" title="Delete">${iconTrash}</button>
                    </div>
                </div>`;
        }

        async function renameThread(id, oldTitle, event) {
            event.stopPropagation();
            showModal({
                title: 'Rename Chat',
                body: 'Enter a new name for this conversation:',
                input: oldTitle,
                placeholder: 'Chat name...',
                confirmText: 'Rename',
                onConfirm: async (newTitle) => {
                    if (newTitle && newTitle.trim() !== "" && newTitle !== oldTitle) {
                        await fetch(`/api/threads/${id}/rename`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: newTitle.trim() }) });
                        if (currentThreadId === id) document.getElementById('chat-header-title').innerText = newTitle.trim();
                        loadHistory();
                        showToast('Chat renamed successfully.', 'success', 2000);
                    }
                }
            });
        }

        async function deleteThread(id, event) {
            event.stopPropagation();
            showModal({
                title: 'Delete Chat',
                body: 'Are you sure you want to delete this conversation permanently? This action cannot be undone.',
                confirmText: 'Delete',
                confirmClass: 'modal-btn-danger',
                onConfirm: async () => {
                    await fetch(`/api/threads/${id}`, { method: 'DELETE' });
                    if (currentThreadId === id) newChat();
                    else loadHistory();
                    showToast('Chat deleted.', 'info', 2000);
                }
            });
        }

        async function togglePin(id, event) {
            event.stopPropagation();
            await fetch(`/api/threads/${id}/pin`, { method: 'PATCH' });
            loadHistory();
        }

        function newChat() {
            messages = [];
            currentThreadId = null;
            clearQuote();
            clearAllAttachments();
            document.getElementById('chat-header-title').innerText = "New Chat";
            document.getElementById('chat-container').innerHTML = `
                <div class="s-empty" id="empty-state">
                    <div class="s-orb"><img src="${logoPath}" alt="SatanAI"></div>
                    <h2 class="s-empty-title">What can I help<br>you with?</h2>

                        <button class="s-suggestion-chip" onclick="fillSuggestion(this)">Analyze a document for me</button>

        async function selectThread(id, title) {
