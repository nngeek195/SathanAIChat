        /* ===== Message Rendering ===== */
        function getTimestamp() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderAllMessages() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            messages.forEach(msg => {
                if (msg.role === "user") {
                    lastUserMessageId = msg.id;
                    lastUserMessageText = msg.content;
                    appendUserUI(msg.id, msg.content);
                } else {
                    appendAiUI(msg.id, msg.content, lastUserMessageId, lastUserMessageText);
                }
            });
            scrollToBottom();
        }

        function parseAttachmentView(content) {
            const fileRegex = /\[File Attachment: (.*?) \((.*?)\)\]/g;
            const imgRegex = /\[Image Attachment: (.*?)\]/g;
            let html = content;
            html = html.replace(fileRegex, (match, filename, url) => {
                return `<a href="${url}" target="_blank" class="media-attachment-pill" style="text-decoration:none;">&#128196; View Document: ${filename}</a>`;
            });
            html = html.replace(imgRegex, (match, url) => {
                return `<img src="${url}" class="media-image-frame" onclick="window.open('${url}')" title="Click to open source image">`;
            });
            return html;
        }

        function appendUserUI(msgId, content) {
            const container = document.getElementById('chat-container');
            const cleanMarkdown = parseAttachmentView(content);
            const b64 = btoa(unescape(encodeURIComponent(content)));
            const isLong = content.length > 500;
            const textClass = isLong ? "user-text-content collapsed" : "user-text-content";
            const btnHtml = isLong ? `<button class="show-more-btn" onclick="toggleExpand(this)">Show More</button>` : '';
            const ts = getTimestamp();

            container.insertAdjacentHTML('beforeend', `
                <div class="s-row s-row-user" id="msg-row-${msgId}">
                    <div class="msg-toolbar toolbar-user">
                        <button class="t-btn" onclick="copyCode(this, '${b64}')">Copy</button>
                        <button class="t-btn" onclick="enableEdit(${msgId}, '${b64}')">Edit</button>
                        <button class="t-btn" onclick="deleteMessage(${msgId})">Delete</button>
                    </div>
                    <div class="s-user">
                        <div class="${textClass}" id="u-text-${msgId}">${cleanMarkdown}</div>
                        ${btnHtml}
                    </div>
                    <span class="msg-timestamp">${ts}</span>
                </div>
            `);
        }

        function appendAiUI(msgId, content, linkedUserId, linkedUserText) {
            const container = document.getElementById('chat-container');
            const cleanMarkdown = parseAttachmentView(content);
            const b64UserText = linkedUserText ? btoa(unescape(encodeURIComponent(linkedUserText))) : '';
            const regenHtml = linkedUserId ? `
                <div class="regen-wrap">
                    <button class="regen-btn" onclick="regenerate(${msgId}, ${linkedUserId}, '${b64UserText}')">${iconRefresh} Regenerate</button>
                </div>` : '';
            const estTokens = Math.round(content.length / 4);
            const ts = getTimestamp();

            container.insertAdjacentHTML('beforeend', `
                <div class="s-row s-row-ai" id="msg-row-${msgId}">
                    <div class="msg-toolbar toolbar-ai">
                        <button class="t-btn" onclick="copyCode(this, '${btoa(unescape(encodeURIComponent(content)))}')">Copy</button>
                        <button class="t-btn" onclick="deleteMessage(${msgId})">Delete</button>
                    </div>
                    <div class="s-ai-head"><img src="${logoPath}" class="s-ai-head-avatar">SatanAI</div>
                    <div class="s-ai-bubble" id="ai-bubble-${msgId}">
                        ${marked.parse(cleanMarkdown)}
                        ${regenHtml}
                    </div>
                    <span class="msg-timestamp">${ts}</span>
                    <div class="telemetry-pill">
                        <span>&#9889; History Cache:</span>
                        <span class="telemetry-val">~${estTokens} generated tokens</span>
                    </div>
                </div>
            `);
        }

        function toggleExpand(btn) {
            const content = btn.previousElementSibling;
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                btn.innerText = "Show Less";
            } else {
                content.classList.add('collapsed');
                btn.innerText = "Show More";
            }
        }

        function copyCode(btn, base64Code) {
            const text = decodeURIComponent(escape(atob(base64Code)));
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.innerText;
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = orig, 2000);
            });
        }

        async function deleteMessage(msgId) {
            showModal({
                title: 'Delete Message',
                body: 'Are you sure you want to delete this message?',
                confirmText: 'Delete',
                confirmClass: 'modal-btn-danger',
                onConfirm: async () => {
                    await fetch(`/api/messages/${msgId}`, { method: 'DELETE' });
                    if (currentThreadId) selectThread(currentThreadId, document.getElementById('chat-header-title').innerText);
                    showToast('Message deleted.', 'info', 2000);
                }
            });
        }

        function enableEdit(msgId, b64Text) {
            const text = decodeURIComponent(escape(atob(b64Text)));
            const container = document.getElementById(`u-text-${msgId}`).parentElement;
            container.innerHTML = `
                <textarea id="edit-area-${msgId}" class="edit-textarea">${text}</textarea>
                <div class="edit-actions">
                    <button class="edit-cancel" onclick="cancelEdit(${msgId}, '${b64Text}')">Cancel</button>
                    <button class="edit-btn" onclick="submitEdit(${msgId})">Save & Resend</button>
                </div>
            `;
        }

        function cancelEdit(msgId, b64Text) {
            const text = decodeURIComponent(escape(atob(b64Text)));
            const isLong = text.length > 300;
            const container = document.getElementById(`edit-area-${msgId}`).parentElement;
            container.innerHTML = `
                <div class="user-text-content ${isLong ? 'collapsed' : ''}" id="u-text-${msgId}">${text}</div>
                ${isLong ? `<button class="show-more-btn" onclick="toggleExpand(this)">Show More</button>` : ''}
            `;
        }

        async function submitEdit(msgId) {
            const newText = document.getElementById(`edit-area-${msgId}`).value.trim();
            if (!newText) return;
            await fetch(`/api/threads/${currentThreadId}/truncate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message_id: msgId })
            });
            const res = await fetch(`/api/threads/${currentThreadId}/messages`);
            const data = await res.json();
            messages = data.messages;
            renderAllMessages();
            document.getElementById('chat-input').value = newText;
            sendMessage();
        }

        async function regenerate(aiMsgId, userId, b64UserText) {
            await fetch(`/api/threads/${currentThreadId}/truncate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message_id: userId })
            });
            const res = await fetch(`/api/threads/${currentThreadId}/messages`);
            const data = await res.json();
            messages = data.messages;
            renderAllMessages();
            document.getElementById('chat-input').value = decodeURIComponent(escape(atob(b64UserText)));
            sendMessage();
        }

        /* ===== Send Message ===== */
        async function sendMessage() {
            const inputEl = document.getElementById('chat-input');
            const baseUrlEl = document.getElementById('base-url');
            const modelNameEl = document.getElementById('model-name');
            const apiKeyEl = document.getElementById('api-key');

            const rawText = inputEl.value.trim();
            const baseUrl = baseUrlEl ? baseUrlEl.value.trim() : '';
            const modelName = modelNameEl ? modelNameEl.value.trim() : '';
            const apiKey = apiKeyEl ? apiKeyEl.value.trim() : '';

            if (!rawText && !activeUploadedImage && activeUploadedFiles.length === 0) return;

            if (!baseUrl || !modelName) {
                showToast('Configuration Error: Please enter a valid Base URL and Model Name in the sidebar configuration panel before chatting.', 'error', 5000);
                return;
            }

            let finalUserPayload = rawText;
            if (activeUploadedImage) {
                finalUserPayload = `[Image Attachment: ${activeUploadedImage.url}]\n${finalUserPayload}`;
            }
            if (activeUploadedFiles.length > 0) {
                let fileTexts = activeUploadedFiles.map(f => `[File Attachment: ${f.filename} (${f.url})]`).join('\n');
                finalUserPayload = `${fileTexts}\n${finalUserPayload}`;
            }
            if (currentQuote !== "") {
                finalUserPayload = `Context Reference From Prior Segment:\n"""\n${currentQuote}\n"""\n\n${finalUserPayload}`;
                clearQuote();
            }

            if (!currentThreadId) {
                try {
                    let generatedTitle = rawText ? (rawText.length > 25 ? rawText.substring(0, 25) + "..." : rawText) : "File Attachment Thread";
                    const res = await fetch('/api/threads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: generatedTitle })
                    });
                    const data = await res.json();
                    currentThreadId = data.thread_id;
                    document.getElementById('chat-header-title').innerText = generatedTitle;
                    loadHistory();
                } catch (error) {
                    console.error("Thread Creation Error:", error);
                    showToast('Database Error: Failed to initialize a new conversation thread.', 'error');
                    return;
                }
            }

            const structuralImagePayload = activeImageBase64;

            inputEl.value = '';
            inputEl.style.height = 'auto';
            updateCharCounter();
            clearAllAttachments();
            document.getElementById('attach-menu').style.display = 'none';

            inputEl.disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('thinking-indicator').style.display = 'flex';

            const empty = document.getElementById('empty-state');
            if (empty) empty.remove();

            appendUserUI('temp', finalUserPayload);
            scrollToBottom();

            const contextHistory = messages.slice(-4);
            contextHistory.push({ role: "user", content: finalUserPayload });

            const bubbleId = 'ai-msg-temp';
            document.getElementById('chat-container').insertAdjacentHTML('beforeend', `
            <div class="s-row s-row-ai" id="msg-row-temp">
                <div class="msg-toolbar toolbar-ai"></div>
                <div class="s-ai-head"><img src="${logoPath}" class="s-ai-head-avatar">SatanAI</div>
                <div class="s-ai-bubble" id="${bubbleId}">
                    <div class="thinking-box" style="border:none;padding:0;background:transparent;">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                        <span class="thinking-label">Generating response...</span>
                    </div>
                </div>
            </div>`);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: contextHistory,
                        base_url: baseUrl,
                        model: modelName,
                        api_key: apiKey,
                        thread_id: currentThreadId,
                        active_image: structuralImagePayload
                    })
                });

                if (!response.ok) {
                    const bubble = document.getElementById(bubbleId);
                    if (bubble) bubble.innerHTML = `<p style="color:var(--accent);font-weight:500;">HTTP Error: ${response.status}</p>`;
                    showToast(`Server returned ${response.status}`, 'error');
                    throw new Error(`HTTP Error ${response.status}`);
                }

                // Restore the Streaming Reader
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let fullAiText = "";
                const bubble = document.getElementById(bubbleId);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const dataObj = JSON.parse(line.substring(6));
                                
                                if (dataObj.error) {
                                    if (bubble) bubble.innerHTML += `<br><span style='color:red'>${dataObj.error}</span>`;
                                    break;
                                }
                                
                                if (dataObj.text) {
                                    fullAiText += dataObj.text;
                                    if (bubble) bubble.innerHTML = marked.parse(parseAttachmentView(fullAiText));
                                    scrollToBottom();
                                }
                                
                                // Render Telemetry Usage
                                if (dataObj.usage) {
                                    const telemetryHtml = `
                                        <div class="telemetry-pill">
                                            <span>&#9889; Context Telemetry:</span>
                                            <span class="telemetry-val">${dataObj.usage.prompt_tokens} In</span>
                                            <span class="telemetry-val">${dataObj.usage.completion_tokens} Out</span>
                                            <span class="telemetry-val">${dataObj.usage.total_tokens} Total</span>
                                        </div>
                                    `;
                                    bubble.parentElement.insertAdjacentHTML('beforeend', telemetryHtml);
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.error("JSON parse error on chunk:", e, line);
                            }
                        }
                    }
                }

                // Refresh the UI from the database to ensure synchronization
                selectThread(currentThreadId, document.getElementById('chat-header-title').innerText);

            } catch (error) {
                const bubble = document.getElementById(bubbleId);
                if (bubble && !bubble.innerHTML.includes('HTTP Error')) {
                    bubble.innerHTML = `<p style="color:var(--accent);font-weight:500;">Network error: ${error.message}</p>`;
                }
                showToast('Network error. Please check your connection and API configuration.', 'error');
            }

            // Remove temp row if it still exists (error case)
            const tempRow = document.getElementById('msg-row-temp');
            if (tempRow) tempRow.remove();

            // Re-enable input
            inputEl.disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('thinking-indicator').style.display = 'none';
            inputEl.focus();
        }
    </script>
</body>
</html>
